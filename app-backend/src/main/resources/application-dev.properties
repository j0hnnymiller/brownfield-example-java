# Development profile configuration
# Activate with: --spring.profiles.active=dev

# Allow automatic schema updates in development
spring.jpa.hibernate.ddl-auto=update

# Development credentials (can be overridden with environment variables)
spring.datasource.username=admin
spring.datasource.password=admin

# Note: CORS configuration for dev is handled in SpringBootBoilerplateApplication.java
# with @Profile("dev") annotation
