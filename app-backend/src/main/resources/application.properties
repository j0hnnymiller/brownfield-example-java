spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# Safe default: validate schema without making changes
# Override in profile-specific properties files (e.g., application-dev.properties)
spring.jpa.hibernate.ddl-auto=validate

spring.datasource.url = jdbc:sqlite:sqlitestorage.db
spring.datasource.driver-class-name = org.sqlite.JDBC

# Use environment variables for credentials (never hardcode in production)
# For local dev, set in application-dev.properties or use default values
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin}
